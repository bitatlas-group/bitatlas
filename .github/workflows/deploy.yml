name: Deploy BitAtlas

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/bitatlas
            git fetch origin main && git reset --hard origin/main
            
            # Rebuild web
            docker build -t bitatlas-web -f Dockerfile.web .
            docker rm -f bitatlas-web-1 2>/dev/null || true
            docker run -d --name bitatlas-web-1 \
              --restart unless-stopped \
              -p 127.0.0.1:3001:3001 \
              -e NEXT_PUBLIC_API_URL=https://api.bitatlas.com \
              --network legacyshield_internal \
              bitatlas-web
            
            # Rebuild API
            docker build -t bitatlas-api -f packages/api/Dockerfile .
            docker rm -f bitatlas-api-1 2>/dev/null || true
            docker run -d --name bitatlas-api-1 \
              --restart unless-stopped \
              --env-file /opt/bitatlas/.env.prod \
              -p 127.0.0.1:4001:4001 \
              --network legacyshield_internal \
              bitatlas-api
            
            echo BitAtlas deployed successfully
