name: CI

on:
  pull_request:
    branches: [main]

jobs:
  web-lint-typecheck:
    name: Web — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/web/package-lock.json

      - run: npm ci
      - name: Lint
        run: npx eslint .
      - name: Type Check
        run: npx tsc --noEmit
      - name: Build
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: https://api.bitatlas.com

  api-lint-typecheck:
    name: API — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/api/package-lock.json

      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Type Check
        run: npx tsc --noEmit

  docker-compose-validate:
    name: Docker Compose — Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create stub env for validation
        run: |
          cat > .env.prod <<EOF
          POSTGRES_PASSWORD=ci-stub
          REDIS_PASSWORD=ci-stub
          MINIO_ACCESS_KEY=ci-stub
          MINIO_SECRET_KEY=ci-stub
          DATABASE_URL=postgresql://x:x@localhost:5432/x
          REDIS_URL=redis://localhost:6379
          JWT_SECRET=ci-stub-secret-that-is-at-least-32-chars-long
          MINIO_ENDPOINT=minio
          MINIO_ACCESS_KEY=ci-stub
          MINIO_SECRET_KEY=ci-stub
          EOF
      - name: Validate compose file
        run: docker compose -f docker-compose.prod.yml config --quiet

      - name: Check network consistency
        run: |
          # Ensure deploy.yml uses docker compose, not manual docker run
          if grep -q "docker run" .github/workflows/deploy.yml; then
            echo "❌ deploy.yml must use 'docker compose', not 'docker run'"
            echo "   Manual docker run bypasses network config and causes service isolation bugs"
            exit 1
          fi
          echo "✅ deploy.yml uses docker compose correctly"

      - name: Verify Dockerfiles exist
        run: |
          test -f packages/api/Dockerfile || { echo "❌ Missing packages/api/Dockerfile"; exit 1; }
          test -f packages/web/Dockerfile || { echo "❌ Missing packages/web/Dockerfile"; exit 1; }
          echo "✅ All Dockerfiles present"
