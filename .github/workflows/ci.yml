name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/web/package-lock.json

      - run: npm ci

      - name: Lint
        run: npx next lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: https://api.bitatlas.com
