server {
    server_name bitatlas.com www.bitatlas.com;

    location = /llms.txt {
        alias /opt/bitatlas/static/llms.txt;
        default_type text/plain;
    }

    location /.well-known/ {
        alias /opt/bitatlas/static/.well-known/;
        default_type application/json;
        add_header Access-Control-Allow-Origin "*";
    }

    location = /sitemap.xml {
        alias /opt/bitatlas/static/sitemap.xml;
        default_type application/xml;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/bitatlas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bitatlas.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = bitatlas.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name bitatlas.com www.bitatlas.com;
    return 301 https://$host$request_uri;
}

server {
    server_name api.bitatlas.com;

    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.bitatlas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bitatlas.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = api.bitatlas.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name api.bitatlas.com;
    return 301 https://$host$request_uri;
}

server {
    server_name s3.bitatlas.com;
    client_max_body_size 100M;

    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, PUT, POST, DELETE, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Amz-Date, X-Amz-Content-Sha256, X-Amz-Security-Token' always;
            add_header 'Access-Control-Max-Age' 3600;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Host MUST match what MinIO used when signing presigned URLs.
        # The API generates presigned URLs connecting to minio:9000 (internal Docker hostname).
        # Nginx proxies to 127.0.0.1:9000 (host-mapped port), so we pass the internal
        # hostname to keep the signature valid.
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/s3.bitatlas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/s3.bitatlas.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = s3.bitatlas.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name s3.bitatlas.com;
    return 301 https://$host$request_uri;
}
